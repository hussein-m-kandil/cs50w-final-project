<div class="bg-(--p-content-background) flex flex-col h-screen">
  <header>
    <app-mainbar />
  </header>

  <main class="relative grow overflow-auto">
    @if (navigation.isInitial() || navigation.navigating() ||
    navigation.error()) {
    <app-navigator />
    } @else {
    <router-outlet />
    }
  </main>

  <p-toast position="bottom-right" class="w-[calc(100%-40px)] max-w-md"
           [pt]="{message: 'shadow-md'}" />
</div>
