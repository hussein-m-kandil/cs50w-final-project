<div class="bg-(--p-content-background)">
  <header>
    <h1 class="text-5xl font-bold text-center">{{title}}</h1>
  </header>

  <main>
    <div class="text-center">
      <p-button label="Toggle Dark Mode" (onClick)="toggleDarkMode()" />
    </div>

    @if (navigation.isInitial() || navigation.navigating() ||
    navigation.error()) {
    <app-navigator />
    } @else {
    <router-outlet />
    }
  </main>

  <p-toast position="bottom-right" class="w-[calc(100%-40px)] max-w-md" />
</div>
